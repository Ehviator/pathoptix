<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PathOptix — E195-E2 Vertical Profile Performance Optimizer. Calculate climb profiles, cruise ECON speeds, descent flight path angles, and plot tactical navigation routes for the Embraer E195-E2." />
    <meta name="theme-color" content="#050b14" />
    <title>PathOptix - E2 Vertical Profile Performance Optimizer</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Register the Service Worker
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker registered successfully with scope: ', reg.scope))
            .catch((err) => console.error('Service Worker registration failed: ', err));
        });
      }
    </script>
  </body>
</html>
